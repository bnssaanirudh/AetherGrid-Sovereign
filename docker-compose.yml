version: '3.8'

services:
  # Main application service (API + Worker thread fallback)
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEV_MODE=True
      - SECRET_KEY=supersecretkeychangeinproduction
      - API_KEYS=internal-ingestion-key-1234,analyst-service-key-abcd
      - POSTGRES_DSN=postgresql://postgres:postgres@db:5432/aethergrid
      - REDIS_URL=redis://cache:6379/0
      - MINIO_ENDPOINT=storage:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    volumes:
      - .:/workspace
    depends_on:
      - db
      - cache
      - storage

  # Metadata Database (PostGIS) - Full Profile
  db:
    image: postgis/postgis:15-3.3
    profiles:
      - full
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=aethergrid
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Distributed Cache / Task coordination - Full Profile
  cache:
    image: redis:7-alpine
    profiles:
      - full
    ports:
      - "6379:6379"

  # Object Storage (MinIO) - Full Profile
  storage:
    image: minio/minio:RELEASE.2023-05-18T00-05-36Z
    profiles:
      - full
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # Prometheus Telemetry - Full Profile
  prometheus:
    image: prom/prometheus:latest
    profiles:
      - full
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml

volumes:
  postgres_data:
  minio_data:
